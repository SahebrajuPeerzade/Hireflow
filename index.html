<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HireFlow – Candidate Screening</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0f4ff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 680px;
    margin: 20px auto;
    padding: 0 16px;
  }

  .header {
    text-align: center;
    padding: 28px 0 18px;
  }

  .logo {
    font-size: 1.7rem;
    font-weight: 700;
    color: #2563eb;
    letter-spacing: -0.5px;
  }

  .logo span { color: #1e293b; }

  .tagline {
    font-size: 0.9rem;
    color: #64748b;
    margin-top: 4px;
  }

  .chat-box {
    background: white;
    border-radius: 18px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.09);
    overflow: hidden;
  }

  .chat-window {
    height: 420px;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .msg {
    display: flex;
    gap: 10px;
    max-width: 88%;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.bot { align-self: flex-start; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    font-weight: 700;
    flex-shrink: 0;
  }

  .msg.bot .avatar { background: #2563eb; color: white; }
  .msg.user .avatar { background: #e2e8f0; color: #475569; }

  .bubble {
    padding: 11px 15px;
    border-radius: 14px;
    font-size: 0.92rem;
    line-height: 1.55;
    color: #1e293b;
  }

  .msg.bot .bubble {
    background: #f1f5f9;
    border-top-left-radius: 4px;
  }

  .msg.user .bubble {
    background: #2563eb;
    color: white;
    border-top-right-radius: 4px;
  }

  .input-area {
    display: flex;
    gap: 10px;
    padding: 14px 16px;
    border-top: 1px solid #e2e8f0;
    background: #fafbff;
  }

  textarea {
    flex: 1;
    border: 1.5px solid #cbd5e1;
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 0.92rem;
    resize: none;
    outline: none;
    font-family: inherit;
    color: #1e293b;
    transition: border 0.2s;
    max-height: 100px;
  }

  textarea:focus { border-color: #2563eb; }

  button#sendBtn {
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 12px;
    padding: 0 20px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  button#sendBtn:hover { background: #1d4ed8; }
  button#sendBtn:disabled { background: #94a3b8; cursor: not-allowed; }

  .progress-bar {
    height: 4px;
    background: #e2e8f0;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: #2563eb;
    transition: width 0.4s ease;
  }

  .trust-badge {
    text-align: center;
    font-size: 0.78rem;
    color: #94a3b8;
    padding: 10px 16px 14px;
  }

  .trust-badge span {
    color: #2563eb;
    font-weight: 600;
  }

  .typing {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 10px 14px;
    background: #f1f5f9;
    border-radius: 14px;
    border-top-left-radius: 4px;
    width: fit-content;
  }

  .typing span {
    width: 7px; height: 7px;
    background: #94a3b8;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }
</style>
</head>

<body>
<div class="container">
  <div class="header">
    <div class="logo">Hire<span>Flow</span></div>
    <div class="tagline">AI-Assisted Candidate Screening · Powered by Claude</div>
  </div>

  <div class="chat-box">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>

    <div class="chat-window" id="chatWindow"></div>

    <div class="input-area">
      <textarea id="userInput" rows="1"
        placeholder="Type your answer here..."
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}">
      </textarea>
      <button id="sendBtn" onclick="sendMessage()">Send →</button>
    </div>

    <div class="trust-badge">
      🔒 <span>No automated decisions.</span> 
      All responses reviewed by a human hiring manager. 
      Data handled under GDPR.
    </div>
  </div>
</div>

<script>
const QUESTIONS = [
  null, // index 0 unused
  "What drew you specifically to this role?",
  "Tell me about a project or achievement most relevant to this position.",
  "What tools, technologies, or methods do you use most in your current work?",
  "How do you prefer to work — structured and process-driven, or flexible and experimental? Why?",
  "What is your current notice period, and are you open to hybrid or remote working?",
  "Is there anything about the role or the company you'd like to know before we wrap up?"
];

const OPENING = `Hi! I'm HireFlow, an AI assistant helping manage this company's hiring process. I'll ask you 6 short questions about your experience and what you're looking for — it takes about 10–15 minutes.\n\n⚠️ Important: I'm an AI. Your answers will be reviewed by a human hiring manager. No automated decisions are made about your application.\n\nLet's begin. What's your name?`;

let stage = 0;
let candidateName = "";
let answers = [];
let conversationHistory = [];

const API_KEY = "YOUR_CLAUDE_API_KEY"; // Replace before deployment

function addMessage(role, text) {
  const window = document.getElementById("chatWindow");
  const wrapper = document.createElement("div");
  wrapper.className = `msg ${role}`;
  const avatar = document.createElement("div");
  avatar.className = "avatar";
  avatar.textContent = role === "bot" ? "HF" : candidateName ? candidateName[0].toUpperCase() : "U";
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerText = text;
  wrapper.appendChild(avatar);
  wrapper.appendChild(bubble);
  window.appendChild(wrapper);
  window.scrollTop = window.scrollHeight;
}

function showTyping() {
  const window = document.getElementById("chatWindow");
  const wrapper = document.createElement("div");
  wrapper.className = "msg bot";
  wrapper.id = "typingIndicator";
  const avatar = document.createElement("div");
  avatar.className = "avatar";
  avatar.textContent = "HF";
  const typing = document.createElement("div");
  typing.className = "typing";
  typing.innerHTML = "<span></span><span></span><span></span>";
  wrapper.appendChild(avatar);
  wrapper.appendChild(typing);
  window.appendChild(wrapper);
  window.scrollTop = window.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById("typingIndicator");
  if (el) el.remove();
}

function updateProgress() {
  const pct = Math.min((stage / 7) * 100, 100);
  document.getElementById("progressFill").style.width = pct + "%";
}

async function callClaude(userMessage) {
  conversationHistory.push({ role: "user", content: userMessage });
  const systemPrompt = `You are HireFlow, a warm and professional AI screening assistant. 
You are in an interview with a candidate named ${candidateName || "the candidate"}. 
Keep responses concise (2–3 sentences max). Acknowledge their answer briefly and 
warmly before moving to the next stage. Never make evaluative judgements in conversation. 
Be encouraging and human.`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 200,
      system: systemPrompt,
      messages: conversationHistory
    })
  });

  const data = await res.json();
  const reply = data.content[0].text;
  conversationHistory.push({ role: "assistant", content: reply });
  return reply;
}

async function generateSummary() {
  const summaryPrompt = `You are a recruitment assistant. Based on these screening answers 
from ${candidateName}, write a brief candidate summary (4–5 sentences) for a human hiring 
manager. Note strengths and areas to probe in interview. Do NOT make a hire/no-hire 
recommendation. Format: plain paragraph, professional tone.

Answers:
${answers.map((a, i) => `Q${i+1}: ${QUESTIONS[i+1]}\nA: ${a}`).join("\n\n")}`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 300,
      messages: [{ role: "user", content: summaryPrompt }]
    })
  });
  const data = await res.json();
  return data.content[0].text;
}

async function sendMessage() {
  const input = document.getElementById("userInput");
  const btn = document.getElementById("sendBtn");
  const text = input.value.trim();
  if (!text) return;

  input.value = "";
  btn.disabled = true;
  addMessage("user", text);

  if (stage === 0) {
    candidateName = text.split(" ")[0];
    stage = 1;
    updateProgress();
    showTyping();
    await new Promise(r => setTimeout(r, 800));
    removeTyping();
    addMessage("bot", `Great to meet you, ${candidateName}! Let's get started.\n\nQ1 of 6: ${QUESTIONS[1]}`);
    btn.disabled = false;
    return;
  }

  answers.push(text);

  if (stage <= 5) {
    showTyping();
    const ack = await callClaude(text);
    removeTyping();
    stage++;
    updateProgress();
    addMessage("bot", `${ack}\n\nQ${stage} of 6: ${QUESTIONS[stage]}`);
  } else if (stage === 6) {
    answers.push(text);
    showTyping();
    const ack = await callClaude(text);
    removeTyping();
    stage = 7;
    updateProgress();
    addMessage("bot", `${ack}\n\nThank you, ${candidateName}! I'm now preparing a summary of your responses for the hiring team...`);
    showTyping();
    const summary = await generateSummary();
    removeTyping();
    addMessage("bot", `✅ Screening complete.\n\nHere's what the hiring manager will receive:\n\n"${summary}"\n\nYou'll receive a personal response within 5 working days. Good luck! 🍀`);
  }

  btn.disabled = false;
}

// Initialise
window.onload = () => {
  addMessage("bot", OPENING);
};
</script>
</body>
</html>
